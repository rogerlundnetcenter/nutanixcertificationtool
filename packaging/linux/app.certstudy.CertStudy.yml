app-id: app.certstudy.CertStudy
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8

command: CertStudy

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  env:
    PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/share/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    DOTNET_NOLOGO: "true"

modules:
  - name: CertStudy
    buildsystem: simple
    build-commands:
      # Restore NuGet packages from the pre-downloaded sources directory
      - dotnet publish CertStudy.Avalonia/CertStudy.Avalonia.csproj
          --runtime linux-x64
          --configuration Release
          --self-contained true
          --output /app/bin/CertStudy.Core
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -p:EnableWindowsTargeting=false
      # Desktop integration
      - install -Dm644 packaging/linux/app.certstudy.CertStudy.desktop
          /app/share/applications/app.certstudy.CertStudy.desktop
      - install -Dm644 packaging/linux/app.certstudy.CertStudy.metainfo.xml
          /app/share/metainfo/app.certstudy.CertStudy.metainfo.xml
      # Icon – fall back to a placeholder if the real asset is absent
      - |
        if [ -f CertStudy.Avalonia/Assets/certstudy.png ]; then
          install -Dm644 CertStudy.Avalonia/Assets/certstudy.png \
            /app/share/icons/hicolor/256x256/apps/app.certstudy.CertStudy.png
        elif [ -f CertStudy.Avalonia/Assets/icon.png ]; then
          install -Dm644 CertStudy.Avalonia/Assets/icon.png \
            /app/share/icons/hicolor/256x256/apps/app.certstudy.CertStudy.png
        fi
      # Wrapper script so Flatpak can locate the binary by the app-id name
      - |
        install -Dm755 /dev/stdin /app/bin/CertStudy << 'EOF'
        #!/bin/sh
        exec /app/bin/CertStudy.Core "$@"
        EOF

    sources:
      - type: git
        url: https://github.com/your-org/nutanixcertificationtool.git
        # Replace with the exact commit SHA or tag you want to package.
        # branch: main
        commit: REPLACE_WITH_COMMIT_SHA

      # Pre-downloaded NuGet packages must be added here as type:file sources
      # when building offline (Flathub policy).  Generate the list with:
      #   flatpak-dotnet-generator.py nuget-sources.json CertStudy.Avalonia/CertStudy.Avalonia.csproj
      # then reference the resulting JSON:
      #
      # - nuget-sources.json
